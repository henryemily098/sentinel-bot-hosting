openAI.apiKey=${OPEN_AI_APIKEY}

discordBot.clientId=${DISCORD_BOT_CLIENTID}
discordBot.clientSecret=${DISCORD_BOT_CLIENTSECRET}
discordBot.callbackUrl=http://localhost:3001/auth/login/callback
discordBot.token=${DISCORD_BOT_TOKEN}
discordBot.baseURL=http://localhost:3002

server.baseURL=http://localhost:3001
server.port=3001
server.servlet.session.cookie.name=WEB_COOKIES
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.timeout=30d

spring.datasource.url=jdbc:mysql://localhost:3306/tubes_pbo
spring.datasource.username=root
spring.datasource.password=

spring.jpa.show-sql=true
spring.jpa.generate-dll=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect